name: Build static docs

# Runs on every push to main that touches the Razor source or the build script.
# Regenerates docs/ from mw-agent/Pages and mw-agent/wwwroot, then commits the
# result back so GitHub Pages picks it up. Path filter intentionally excludes
# docs/** so this workflow doesn't trigger itself.

on:
  push:
    branches: [main]
    paths:
      - 'mw-agent/wwwroot/**'
      - 'mw-agent/Pages/**'
      - 'scripts/build-docs.py'
      - '.github/workflows/build-docs.yml'
  workflow_dispatch:   # also allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: build-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # need the full history so the auto-commit pushes cleanly
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build docs/
        run: python scripts/build-docs.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "docs/ is already up to date — nothing to commit"
          else
            git commit -m "build(docs): regenerate from source [skip ci]"
            git push
          fi
