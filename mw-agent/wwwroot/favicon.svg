<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <!-- dark deep gradient for the rounded square -->
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0"   stop-color="#1a1a1a"/>
            <stop offset="1"   stop-color="#050505"/>
        </linearGradient>

        <!-- soft inner glow behind the X -->
        <radialGradient id="glow" cx="50%" cy="50%" r="55%">
            <stop offset="0"   stop-color="#ffffff" stop-opacity="0.18"/>
            <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>

        <!-- chrome-style gradients on the two X blades, inverted to give 3-D depth -->
        <linearGradient id="bladeA" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#b3b3b3"/>
        </linearGradient>
        <linearGradient id="bladeB" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#d4d4d4"/>
            <stop offset="1" stop-color="#ffffff"/>
        </linearGradient>
    </defs>

    <!-- container -->
    <rect width="64" height="64" rx="14" fill="url(#bg)"/>
    <rect width="64" height="64" rx="14" fill="url(#glow)"/>

    <!-- subtle 1px inner stroke for definition on light browser tabs -->
    <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="rgba(255,255,255,0.07)"/>

    <!-- X blade A: top-left → bottom-right parallelogram -->
    <polygon points="10,18 18,10 54,46 46,54" fill="url(#bladeA)"/>

    <!-- X blade B: top-right → bottom-left parallelogram (drawn on top) -->
    <polygon points="46,10 54,18 18,54 10,46" fill="url(#bladeB)"/>

    <!-- thin highlight slash on blade A — futuristic etched-edge detail (invisible at 16px, sharpens at 32px+) -->
    <polygon points="18,18 19,17 53,51 52,52" fill="#ffffff" opacity="0.55"/>
</svg>
